<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>别委屈了林倚舒</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .page.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        .title {
            font-size: 36px;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: -50px;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out 0.2s both;
        }

        .buttons-container {
            display: flex;
            gap: 30px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
            position: relative;
        }

        .btn {
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 10;
        }

        .btn-forgive {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-forgive:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(17, 153, 142, 0.4);
        }

        .btn-forgive:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-no {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            transition: transform 0.2s ease-out, left 0.3s ease-out, top 0.3s ease-out;
            position: relative;
        }

        .btn-no:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(235, 51, 73, 0.4);
        }

        .result-page {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        .result-page.show {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        .result-image {
            width: 280px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
            background: white;
            padding: 10px;
        }

        .result-text {
            font-size: 28px;
            color: #ffffff;
            font-weight: 700;
            margin-top: 30px;
            letter-spacing: 4px;
            animation: fadeInUp 0.6s ease-out 0.5s both;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }

        .result-sub {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 15px;
            animation: fadeInUp 0.6s ease-out 0.7s both;
        }

        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            font-size: 24px;
            animation: floatUp 4s ease-out forwards;
            opacity: 0.8;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            .title { font-size: 28px; letter-spacing: 2px; margin-bottom: 40px; }
            .subtitle { font-size: 16px; margin-bottom: 30px; }
            .buttons-container { flex-direction: column; gap: 20px; }
            .btn { padding: 14px 36px; font-size: 18px; }
            .result-image { width: 240px; }
            .result-text { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="hearts-container" id="heartsContainer"></div>
    <div class="celebration" id="celebration"></div>

    <!-- 主页 -->
    <div class="page" id="mainPage">
        <div class="title">✨ 别委屈了林倚舒 ✨</div>
        <div class="subtitle">给你两个选择，选一个吧 💜</div>
        <div class="buttons-container" id="buttonsContainer">
            <button class="btn btn-forgive" id="btnForgive">原谅曾航</button>
            <button class="btn btn-no" id="btnNo">不原谅</button>
        </div>
    </div>

        <div class="result-text">🎉 咱俩又好上了 🎉</div>
        <div class="result-sub">曾航保证以后不再让林倚舒委屈了 💕</div>
    </div>

    <script>
        // 飘浮爱心背景
        function createBackgroundHearts() {
            const container = document.getElementById('heartsContainer');
            const emojis = ['💜', '💙', '💚', '💛', '🧡', '❤️', '💖'];
            
            for (let i = 0; i < 12; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 4 + 's';
                heart.style.animationDuration = (4 + Math.random() * 4) + 's';
                heart.style.fontSize = (16 + Math.random() * 20) + 'px';
                container.appendChild(heart);
            }
        }
        createBackgroundHearts();

        // 不原谅按钮逃跑逻辑
        const btnNo = document.getElementById('btnNo');
        const btnForgive = document.getElementById('btnForgive');
        const mainPage = document.getElementById('mainPage');
        const resultPage = document.getElementById('resultPage');
        const celebration = document.getElementById('celebration');

        let isMobile = 'ontouchstart' in window;

        function moveButtonAway(clientX, clientY) {
            const rect = btnNo.getBoundingClientRect();
            const btnCenterX = rect.left + rect.width / 2;
            const btnCenterY = rect.top + rect.height / 2;
            
            // 计算鼠标/手指与按钮中心的距离
            const distance = Math.sqrt(Math.pow(clientX - btnCenterX, 2) + Math.pow(clientY - btnCenterY, 2));
            const triggerDistance = isMobile ? 100 : 120; // 移动端触发距离稍小
            
            if (distance < triggerDistance) {
                // 计算逃跑方向（远离鼠标）
                let angle = Math.atan2(btnCenterY - clientY, btnCenterX - clientX);
                
                // 添加随机扰动，避免直线逃跑
                angle += (Math.random() - 0.5) * 0.5;
                
                const moveDistance = isMobile ? 150 : 180;
                let newX = btnCenterX + Math.cos(angle) * moveDistance;
                let newY = btnCenterY + Math.sin(angle) * moveDistance;
                
                // 确保按钮在屏幕范围内
                const padding = 20;
                const maxX = window.innerWidth - rect.width - padding;
                const maxY = window.innerHeight - rect.height - padding;
                
                newX = Math.max(padding, Math.min(newX, maxX));
                newY = Math.max(padding, Math.min(newY, maxY));
                
                // 使用 transform 移动，更流畅
                const currentLeft = rect.left;
                const currentTop = rect.top;
                const translateX = newX - currentLeft - rect.width / 2;
                const translateY = newY - currentTop - rect.height / 2;
                
                btnNo.style.transform = `translate(${translateX}px, ${translateY}px)`;
                
                // 偶尔改变按钮文字增加趣味性
                const texts = ['不原谅', '点不到~', '太远了', '够不着', '再试试', '哎呀'];
                if (Math.random() > 0.7) {
                    btnNo.textContent = texts[Math.floor(Math.random() * texts.length)];
                }
            }
        }

        // 桌面端：鼠标移动
        document.addEventListener('mousemove', (e) => {
            moveButtonAway(e.clientX, e.clientY);
        });

        // 移动端：触摸移动
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            moveButtonAway(touch.clientX, touch.clientY);
        });

        // 点击不原谅按钮也逃跑
        btnNo.addEventListener('click', (e) => {
            e.preventDefault();
            const rect = btnNo.getBoundingClientRect();
            const randomAngle = Math.random() * Math.PI * 2;
            const moveDistance = 200;
            let newX = rect.left + rect.width / 2 + Math.cos(randomAngle) * moveDistance;
            let newY = rect.top + rect.height / 2 + Math.sin(randomAngle) * moveDistance;
            
            const padding = 20;
            const maxX = window.innerWidth - rect.width - padding;
            const maxY = window.innerHeight - rect.height - padding;
            newX = Math.max(padding, Math.min(newX, maxX));
            newY = Math.max(padding, Math.min(newY, maxY));
            
            const translateX = newX - rect.left - rect.width / 2;
            const translateY = newY - rect.top - rect.height / 2;
            
            btnNo.style.transform = `translate(${translateX}px, ${translateY}px)`;
            btnNo.textContent = '点不到~';
        });

        // 点击原谅按钮 -> 显示和好页面
        btnForgive.addEventListener('click', () => {
            mainPage.classList.add('hidden');
            resultPage.classList.add('show');
            
            // 庆祝彩带
            createConfetti();
            
            // 创建爱心雨
            for (let i = 0; i < 30; i++) {
                setTimeout(() => createFallingHeart(), i * 100);
            }
        });

        function createConfetti() {
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3', '#1dd1a1'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = (6 + Math.random() * 8) + 'px';
                confetti.style.height = (6 + Math.random() * 8) + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                celebration.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        function createFallingHeart() {
            const container = document.getElementById('heartsContainer');
            const emojis = ['💜', '💖', '💕', '❤️', '🧡', '💛', '💚', '💙'];
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = '-30px';
            heart.style.fontSize = (20 + Math.random() * 20) + 'px';
            heart.style.animationDuration = (3 + Math.random() * 2) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
    </script>
</body>
</html>
